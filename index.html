<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Village Barber & Co | Blade — AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --dark: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --gold: #c9a84c;
    --gold-light: #e0c070;
    --cream: #f5f0e8;
    --cream-dark: #ede8e0;
    --foam: #ffffff;
    --text: #1a1a1a;
    --muted: #888888;
    --border: #e0d8cc;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(160deg, #0f0f0f 0%, #1a1a1a 60%, #2a2010 100%);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 16px;
  }
  .wrapper { width: 100%; max-width: 400px; border-radius: 20px; overflow: hidden; box-shadow: 0 32px 80px rgba(0,0,0,0.6); }
  .header { background: var(--dark); padding: 20px; display: flex; align-items: center; gap: 14px; position: relative; border-bottom: 2px solid var(--gold); }
  .avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, var(--gold), var(--gold-light)); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; position: relative; }
  .online { position: absolute; bottom: 1px; right: 1px; width: 12px; height: 12px; background: #4ade80; border-radius: 50%; border: 2px solid var(--dark); }
  .header-info h2 { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--gold); letter-spacing: 2px; line-height: 1; }
  .header-info p { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 3px; }
  .header-badge { margin-left: auto; font-size: 9px; color: var(--gold); background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.3); padding: 3px 8px; border-radius: 4px; white-space: nowrap; flex-shrink: 0; font-family: 'DM Mono', monospace; letter-spacing: 0.1em; text-transform: uppercase; }
  .chat { background: var(--cream); height: 430px; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
  .chat::-webkit-scrollbar { width: 3px; }
  .chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .msg { display: flex; gap: 8px; animation: pop 0.25s ease both; }
  @keyframes pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .msg.user { flex-direction: row-reverse; }
  .msg-av { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; margin-top: 2px; }
  .msg.ai .msg-av { background: linear-gradient(135deg, var(--gold), var(--gold-light)); }
  .msg.user .msg-av { background: var(--dark); }
  .bubble { max-width: 80%; padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.55; }
  .msg.ai .bubble { background: var(--foam); color: var(--text); border-top-left-radius: 4px; border: 1px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .msg.user .bubble { background: var(--dark); color: white; border-top-right-radius: 4px; }
  .card-bubble { max-width: 92%; }
  .card { background: var(--foam); border: 1px solid var(--border); border-radius: 16px; border-top-left-radius: 4px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .card-header { background: var(--dark); color: var(--gold); padding: 10px 14px; font-size: 13px; font-weight: 600; font-family: 'Bebas Neue', sans-serif; letter-spacing: 1.5px; }
  .card-body { padding: 12px 14px; font-size: 13px; color: var(--text); line-height: 1.7; }
  .card-body b { color: var(--dark); }
  .price { color: var(--gold); font-weight: 600; }
  .card-btn { display: block; margin: 6px 14px; background: var(--gold); color: var(--dark); text-decoration: none; text-align: center; padding: 10px; border-radius: 6px; font-size: 13px; font-weight: 700; font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; transition: background 0.15s; }
  .card-btn:last-child { margin-bottom: 12px; }
  .card-btn:hover { background: var(--gold-light); }
  .card-btn.secondary { background: var(--dark); color: var(--gold); }
  .typing { display: flex; gap: 8px; align-items: center; }
  .typing-av { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, var(--gold), var(--gold-light)); display: flex; align-items: center; justify-content: center; font-size: 13px; }
  .typing-bubble { background: var(--foam); border: 1px solid var(--border); border-radius: 16px; border-top-left-radius: 4px; padding: 12px 16px; display: flex; gap: 4px; align-items: center; }
  .typing-bubble span { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); animation: bounce 1.2s infinite; }
  .typing-bubble span:nth-child(2){animation-delay:0.2s}
  .typing-bubble span:nth-child(3){animation-delay:0.4s}
  @keyframes bounce{0%,80%,100%{transform:scale(0.6);opacity:0.4}40%{transform:scale(1);opacity:1}}
  .quick-wrap { background: var(--cream-dark); padding: 10px 12px; display: flex; flex-wrap: wrap; gap: 7px; border-top: 1px solid var(--border); }
  .qr { background: var(--foam); border: 1px solid var(--border); color: var(--dark); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; padding: 7px 12px; border-radius: 4px; cursor: pointer; transition: all 0.15s; min-height: 34px; }
  .qr:hover, .qr:active { background: var(--gold); color: var(--dark); border-color: var(--gold); font-weight: 700; }
  .input-row { background: var(--foam); border-top: 1px solid var(--border); padding: 10px 12px; display: flex; gap: 8px; align-items: flex-end; }
  #msg { flex: 1; border: 1px solid var(--border); border-radius: 6px; padding: 10px 16px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); background: var(--cream); outline: none; resize: none; max-height: 90px; line-height: 1.4; min-height: 42px; }
  #msg:focus { border-color: var(--gold); }
  #msg::placeholder { color: var(--muted); }
  .send { width: 42px; height: 42px; border-radius: 6px; background: var(--dark); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
  .send:hover { background: var(--gold); }
  .send:active { transform: scale(0.92); }
  .send svg { width: 17px; height: 17px; fill: white; }
  .footer { background: var(--dark); text-align: center; padding: 8px; font-size: 10px; color: rgba(255,255,255,0.3); border-top: 1px solid #333; }
  .footer a { color: var(--gold); text-decoration: none; }
  .float-call { position: fixed; bottom: 80px; right: 20px; width: 48px; height: 48px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 4px 16px rgba(201,168,76,0.5); cursor: pointer; text-decoration: none; z-index: 100; transition: transform 0.2s; }
  .float-call:hover { transform: scale(1.1); }
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <div class="avatar">✂️<div class="online"></div></div>
    <div class="header-info">
      <h2>Blade</h2>
      <p>The Village Barber & Co · Hervey Bay</p>
    </div>
    <div class="header-badge">AI Assistant</div>
  </div>
  <div class="chat" id="chat"></div>
  <div class="quick-wrap">
    <button class="qr" onclick="showPricing()">💈 Pricing</button>
    <button class="qr" onclick="showBooking()">📅 Book Now</button>
    <button class="qr" onclick="quick('What are your opening hours?')">🕐 Hours</button>
    <button class="qr" onclick="quick('Where are you located?')">📍 Location</button>
    <button class="qr" onclick="quick('Can I walk in without booking?')">🚶 Walk-ins?</button>
    <button class="qr" onclick="showHuman()">👤 Talk to Danny</button>
  </div>
  <div class="input-row">
    <textarea id="msg" placeholder="Ask Blade anything..." rows="1" onkeydown="handleKey(event)" oninput="resize(this)"></textarea>
    <button class="send" onclick="send()"><svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg></button>
  </div>
  <div class="footer">Powered by <a href="#">Groq AI</a> · The Village Barber & Co</div>
</div>

<a href="tel:0422283609" class="float-call" title="Call The Village Barber">📞</a>

<script>
const SYSTEM_PROMPT = `You are Blade, the AI assistant for The Village Barber & Co — a premium traditional barbershop in Scarness, Hervey Bay, Queensland.

YOUR PERSONALITY:
- Cool, confident and straight to the point — like a good barber
- Use occasional barber emojis ✂️💈
- Keep replies SHORT — 2 sentences max
- Always offer to help with booking

BARBERSHOP DETAILS:
- Name: The Village Barber & Co
- Address: Suite 2, 355 Esplanade, Scarness, Hervey Bay QLD 4655
- Phone: 0422 283 609
- Instagram: @thevillagebarberco
- Hours: Tue–Fri 8:00am–5:00pm · Sat 7:00am–2:00pm · Mon & Sun Closed

SERVICES & PRICING:
- Style Cut — from $30 (30 mins)
- #0 & #0.5 Fades — from $35 (30 mins)
- Crew Cut — from $25 (30 mins)
- Skin/Tapers/Burst Fades — from $? (30–60 mins)
- Beard Trims & Shaves — see booking page

BOOKINGS:
- Book via Fresha: fresha.com/a/the-village-barber-co-scarness
- Walk-ins welcome but bookings guarantee your spot

RULES:
- Never make up prices beyond what's listed
- If unsure: "Give Danny a call on 0422 283 609!"
- Only discuss barbershop topics`;

function showPricing() {
  addCard(`<div class="card-header">💈 SERVICES & PRICING</div>
    <div class="card-body">
      <b>Style Cuts</b><br>
      Style Cut — <span class="price">from $30</span> · 30 mins<br>
      Crew Cut — <span class="price">from $25</span> · 30 mins<br><br>
      <b>Fades</b><br>
      #0 & #0.5 Fades — <span class="price">from $35</span> · 30 mins<br>
      Skin/Tapers/Burst Fades — 30–60 mins<br><br>
      <b>Beard</b><br>
      Beard Trims & Shaves — see booking page<br><br>
      ✨ All cuts include premium styling & hot towel finish
    </div>
    <a class="card-btn" href="https://www.fresha.com/a/the-village-barber-co-scarness-suite-2-355-esplanade-or5jk9nf/booking" target="_blank">BOOK NOW →</a>`);
}

function showBooking() {
  addCard(`<div class="card-header">📅 BOOK YOUR CUT</div>
    <div class="card-body">
      <b>The Village Barber & Co</b><br>
      Suite 2, 355 Esplanade, Scarness<br>
      Hervey Bay QLD 4655<br><br>
      📞 0422 283 609<br><br>
      🕐 Tue–Fri: 8:00am–5:00pm<br>
      🕐 Sat: 7:00am–2:00pm<br>
      ❌ Mon & Sun: Closed<br><br>
      Walk-ins welcome — booking guarantees your spot 💈
    </div>
    <a class="card-btn" href="https://www.fresha.com/a/the-village-barber-co-scarness-suite-2-355-esplanade-or5jk9nf/booking" target="_blank">BOOK ONLINE →</a>
    <a class="card-btn secondary" href="tel:0422283609">📞 CALL TO BOOK</a>`);
}

function showHuman() {
  addCard(`<div class="card-header">👤 TALK TO DANNY</div>
    <div class="card-body">
      Need to chat directly? Danny and the team are happy to help.<br><br>
      📞 0422 283 609<br>
      📸 @thevillagebarberco on Instagram
    </div>
    <a class="card-btn" href="tel:0422283609">📞 CALL NOW</a>
    <a class="card-btn secondary" href="https://www.instagram.com/thevillagebarberco" target="_blank">📸 Instagram DM</a>`);
}

function addCard(innerHTML) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.innerHTML = `<div class="msg-av">✂️</div><div class="card-bubble"><div class="card">${innerHTML}</div></div>`;
  chat.appendChild(div); chat.scrollTop = chat.scrollHeight;
}

const FALLBACK = {
  hours: "We're open Tue–Fri 8am–5pm and Sat 7am–2pm ✂️ Closed Monday and Sunday. Walk-ins welcome but book ahead to guarantee your spot!",
  location: "Find us at Suite 2, 355 Esplanade, Scarness — right on the beachfront strip in Hervey Bay 📍",
  walkin: "Walk-ins are always welcome! 🚶 But booking ahead guarantees your spot — book online via Fresha 💈",
  default: "Hey! I'm Blade from The Village Barber & Co ✂️ I can help with pricing, bookings, hours or location. What do you need? 💈"
};

function getFallback(text) {
  const t = text.toLowerCase();
  if (t.includes('price') || t.includes('cost') || t.includes('how much') || t.includes('fade') || t.includes('cut') || t.includes('beard')) { showPricing(); return null; }
  if (t.includes('book') || t.includes('reserv') || t.includes('appoint')) { showBooking(); return null; }
  if (t.includes('hour') || t.includes('open') || t.includes('close') || t.includes('time')) return FALLBACK.hours;
  if (t.includes('where') || t.includes('location') || t.includes('address') || t.includes('find')) return FALLBACK.location;
  if (t.includes('walk') || t.includes('without')) return FALLBACK.walkin;
  if (t.includes('danny') || t.includes('human') || t.includes('speak') || t.includes('person')) { showHuman(); return null; }
  return FALLBACK.default;
}

let history = [{ role: 'system', content: SYSTEM_PROMPT }];

async function send() {
  const input = document.getElementById('msg');
  const text = input.value.trim();
  if (!text) return;
  input.value = ''; input.style.height = 'auto';
  const t = text.toLowerCase();
  addMsg('user', text);
  history.push({ role: 'user', content: text });
  if (t.includes('price') || t.includes('cost') || t.includes('how much') || t.includes('fade') || t.includes('cut') || t.includes('service')) { showPricing(); history.push({ role: 'assistant', content: "Here's our pricing!" }); return; }
  if (t.includes('book') || t.includes('reserv') || t.includes('appoint')) { showBooking(); history.push({ role: 'assistant', content: "Here's how to book!" }); return; }
  if (t.includes('danny') || t.includes('human') || t.includes('speak')) { showHuman(); history.push({ role: 'assistant', content: "Here's how to reach Danny!" }); return; }
  showTyping();
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history })
    });
    const data = await res.json();
    hideTyping();
    const reply = data.reply || getFallback(text);
    if (reply) { addMsg('ai', reply); history.push({ role: 'assistant', content: reply }); }
  } catch(err) {
    hideTyping();
    const reply = getFallback(text);
    if (reply) { addMsg('ai', reply); history.push({ role: 'assistant', content: reply }); }
  }
}

function quick(text) { document.getElementById('msg').value = text; send(); }
function addMsg(role, text) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `<div class="msg-av">${role === 'ai' ? '✂️' : '👤'}</div><div class="bubble">${text.replace(/\n/g,'<br>')}</div>`;
  chat.appendChild(div); chat.scrollTop = chat.scrollHeight;
}
let typingEl = null;
function showTyping() {
  const chat = document.getElementById('chat');
  typingEl = document.createElement('div'); typingEl.className = 'typing';
  typingEl.innerHTML = `<div class="typing-av">✂️</div><div class="typing-bubble"><span></span><span></span><span></span></div>`;
  chat.appendChild(typingEl); chat.scrollTop = chat.scrollHeight;
}
function hideTyping() { if (typingEl) { typingEl.remove(); typingEl = null; } }
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }
function resize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 90) + 'px'; }
window.onload = () => {
  setTimeout(() => {
    addMsg('ai', "Hey! Welcome to The Village Barber & Co ✂️\n\nI'm Blade — I can help with pricing, bookings, hours and location.\n\nWhat are you after today? 💈");
  }, 400);
};
</script>
</body>
</html>
